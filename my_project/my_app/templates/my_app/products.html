<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Products - Return-Ease</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'my_app/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .loading-spinner {
            text-align: center;
            padding: 4rem;
            font-size: 1.5rem;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Return-Ease</div>
        <nav>
            <a href="{% url 'home' %}" class="nav-btn">Home</a>
            <a href="{% url 'login' %}" class="nav-btn">Login</a>
            <a href="{% url 'signup' %}" class="nav-btn primary">Sign Up</a>
        </nav>
    </header>

    <main>
        <section class="products-section">
            <div class="section-header">
                <h1>Available Products</h1>
                <p>Browse and buy from our exclusive collection.</p>
            </div>

            <!-- Store the base URL with a unique placeholder to avoid accidental replacements -->
            <div id="products-container" class="products-grid" data-buy-url="{% url 'buy_now' 999999 %}">
                <div class="loading-spinner">Loading products...</div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.getElementById('products-container');
            const buyUrlPattern = container.getAttribute('data-buy-url');

            fetch('https://dummyjson.com/products')
                .then(response => response.json())
                .then(data => {
                    const products = data.products;
                    container.innerHTML = ''; // Clear loading spinner

                    if (products && products.length > 0) {
                        products.forEach(product => {
                            // Safely replace the unique placeholder with the actual ID
                            const buyUrl = buyUrlPattern.replace('999999', product.id);

                            const card = document.createElement('div');
                            card.className = 'product-card';
                            card.innerHTML = `
                                <div class="product-image">
                                    <img src="${product.thumbnail}" alt="${product.title}" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                                    <span class="product-category">${product.category}</span>
                                </div>
                                <div class="product-details">
                                    <div class="product-header">
                                        <h3>${product.title}</h3>
                                        <span class="product-price">$${product.price}</span>
                                    </div>
                                    <p class="product-brand">${product.brand}</p>
                                    <p class="product-desc">${product.description.substring(0, 80)}...</p>
                                    <div class="product-footer">
                                        <div class="product-rating">⭐ ${product.rating}</div>
                                        <a href="${buyUrl}" class="buy-btn">Buy Now</a>
                                    </div>
                                </div>
                            `;
                            container.appendChild(card);
                        });
                    } else {
                        container.innerHTML = '<div class="empty-products"><p>No products found.</p></div>';
                    }
                })
                .catch(error => {
                    console.error('Error fetching products:', error);
                    container.innerHTML = '<div class="empty-products"><p>Error loading products. Please try again later.</p></div>';
                });
        });
    </script>
</body>

</html>
