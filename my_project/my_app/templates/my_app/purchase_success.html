<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Successful - Return-Ease</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'my_app/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .success-card {
            max-width: 500px;
            text-align: center;
            background: var(--glass);
            padding: 4rem 2rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.8s ease-out;
        }

        .success-icon {
            font-size: 5rem;
            color: #10b981;
            margin-bottom: 1.5rem;
        }

        .success-card h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .success-card p {
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .home-link {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: var(--white);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .home-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>

<body class="auth-page">
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h2>Purchase Successful!</h2>
        <p>Your order for <strong>{{ product.title }}</strong> has been placed and saved to your account.</p>
        <a href="{% url 'home' %}" class="home-link">Go to Home</a>
    </div>
</body>

</html>
