<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Return-Ease</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'my_app/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your details to reset</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="reset_input">Email or Username</label>
                    <input type="text" id="reset_input" name="reset_input" placeholder="Enter your email or username"
                        required>
                </div>
                <!-- Adding a placeholder for Reset Password field as requested -->
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Enter new password"
                        required>
                </div>
                <button type="submit" class="auth-btn">Reset</button>
            </form>
            <div class="auth-footer">
                <p>Back to <a href="{% url 'login' %}">Login</a></p>
            </div>
        </div>
    </div>
</body>

</html>
