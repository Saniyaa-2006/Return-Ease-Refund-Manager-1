<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Return-Ease</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'my_app/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card logout-card">
            <div class="auth-header">
                <div class="logout-icon">👋</div>
                <h2>Are you sure you want to logout?</h2>
                <p>We'll miss seeing you manage your refunds!</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="auth-btn logout-confirm-btn">Logout</button>
                <a href="{% url 'dashboard' %}" class="cancel-btn">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
