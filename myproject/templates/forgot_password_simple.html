{% extends "base.html" %}

{% block title %}Reset Password - Return-Ease{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Reset Password</h2>
    <p class="card-subtitle">Enter your username and your new desired password.</p>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" type="text" name="username" id="username" placeholder="Enter your username"
                required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="new_password">New Password</label>
            <input class="form-control" type="password" name="new_password" id="new_password"
                placeholder="Enter new password" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm New Password</label>
            <input class="form-control" type="password" name="confirm_password" id="confirm_password"
                placeholder="Confirm new password" required>
        </div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Update Password</button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem;">
        <p style="color: var(--text-muted);">Remembered your password? <a href="{% url 'login' %}"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Log In</a></p>
    </div>
</div>
{% endblock %}
